version: 2

project_name: crank

builds:
  - id: crank
    main: ./cmd/crank
    binary: crank
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - builds:
      - crank
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  use: github


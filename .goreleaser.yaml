version: 2

project_name: crank

before:
  hooks:
    - go mod tidy

builds:
  - skip: true

archives:
  - format: tar.gz
    files:
      - LICENSE*
      - README*
      - SECURITY*
      - docs/*

checksum:
  name_template: checksums.txt

changelog:
  use: github

release:
  github:
    owner: ogwurujohnson
    name: crank
